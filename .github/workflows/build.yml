name: Build Fabric Mod
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract zip
        run: |
          Expand-Archive -Path mod_build.zip -DestinationPath . -Force
          if (Test-Path "mod_build") {
              copy-item mod_build\* . -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Setup Java 16
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 16

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 7.1.1

      - name: Generate Wrapper
        run: gradle wrapper --gradle-version 7.1.1

      - name: Build Mod
        run: .\gradlew.bat build --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeVisuals-All-Files
          path: |
            .\**\build\
            .\*
