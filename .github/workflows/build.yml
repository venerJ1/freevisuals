name: Build Fabric Mod From Zip
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract zip
        run: |
          Expand-Archive -Path mod_build.zip -DestinationPath . -Force
          if (Test-Path "mod_build") {
              copy-item mod_build\* . -Recurse -Force -ErrorAction SilentlyContinue
          }

      - uses: actions/setup-java@v4
        with:
          java-version: '16'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.1.1'

      - name: Build with Gradle
        run: gradle build

      - name: Upload Mod to File.io
        run: |
          # Ищем любой созданный .jar файл в папках сборки (build/libs)
          $file = Get-ChildItem -Recurse -Filter "*.jar" | Where-Object { $_.FullName -like "*build\libs*" -and $_.FullName -notlike "*-dev.jar" -and $_.FullName -notlike "*-sources.jar" } | Select-Object -First 1
          if ($file) {
              $response = curl.exe -F "file=@$($file.FullName)" https://file.io
              echo "----------------------------------------"
              echo "ВАША ССЫЛКА НА СКАЧИВАНИЕ МОДА:"
              echo $response
              echo "----------------------------------------"
          } else {
              echo "Файл .jar не найден. Проверяем все jar в проекте:"
              Get-ChildItem -Recurse -Filter "*.jar" | Select-Object FullName
          }
