name: Build Fabric Mod
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract zip
        run: |
          Expand-Archive -Path mod_build.zip -DestinationPath . -Force
          if (Test-Path "mod_build") {
              copy-item mod_build\* . -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Fix Settings and Build Files
        run: |
          $settings = @"
          pluginManagement {
              repositories {
                  maven { url = "https://fabricmc.net" }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = 'freevisuals'
          "@
          Set-Content -Path settings.gradle -Value $settings -Encoding UTF8
          
          (Get-Content build.gradle) -replace "0.8-SNAPSHOT", "0.8.16" | Set-Content build.gradle
          (Get-Content build.gradle) -replace "0.8-build.16", "0.8.16" | Set-Content build.gradle

      - name: Setup Java 16
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 16

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 7.1.1

      - name: Generate Wrapper
        run: gradle wrapper --gradle-version 7.1.1

      - name: Build Mod
        run: .\gradlew.bat remapJar --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeVisuals-Mod-Jar
          path: |
            **/build/libs/*.jar
            build/libs/*.jar
