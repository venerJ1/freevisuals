name: Build Fabric Mod From Zip
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract zip
        run: |
          Expand-Archive -Path mod_build.zip -DestinationPath . -Force
          if (Test-Path "mod_build") {
              copy-item mod_build\* . -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Fix Fabric Repository
        run: |
          # Добавляем репозиторий Fabric в settings.gradle, чтобы плагин fabric-loom смог скачаться
          if (Test-Path "settings.gradle") {
              $content = Get-Content settings.gradle
              $updated = "pluginManagement { repositories { maven { url 'https://fabricmc.net' }; mavenCentral(); gradlePluginPortal() } }; " + [string]::Join([environment]::NewLine, $content)
              Set-Content -Path settings.gradle -Value $updated
          }

      - uses: actions/setup-java@v4
        with:
          java-version: '16'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.1.1'

      - name: Build with Gradle
        run: gradle build

      - uses: actions/upload-artifact@v4
        with:
          name: Fabric-Mod-Jar
          path: "**/build/libs/*.jar"
