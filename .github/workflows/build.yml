name: Build Fabric Mod
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract zip
        run: |
          Expand-Archive -Path mod_build.zip -DestinationPath . -Force
          if (Test-Path "mod_build") {
              copy-item mod_build\* . -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Overwrite build.gradle with Fixes
        run: |
          $config = @"
          buildscript {
              repositories {
                  maven { url = "https://fabricmc.net" }
                  mavenCentral()
              }
              dependencies {
                  classpath "net.fabricmc:fabric-loom:0.8-build.16"
              }
          }
          plugins {
              id 'fabric-loom' version '0.8-build.16'
          }
          version = '1.0.0'
          group = 'com.freevisuals'
          repositories {
              maven { url = "https://fabricmc.net" }
              mavenCentral()
          }
          dependencies {
              minecraft "com.mojang:minecraft:1.17.1"
              mappings "net.fabricmc:yarn:1.17.1+build.62:v2"
              modImplementation "net.fabricmc:fabric-loader:0.11.7"
          }
          processResources {
              inputs.property "version", project.version
              filesMatching("fabric.mod.json") {
                  expand "version": project.version
              }
          }
          tasks.withType(JavaCompile).configureEach {
              options.release = 16
          }
          java {
              withSourcesJar()
          }
          jar {
              from "LICENSE"
          }
          "@
          Set-Content -Path build.gradle -Value $config -Encoding UTF8

      - name: Setup Java 16
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 16

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 7.1.1

      - name: Generate Wrapper
        run: gradle wrapper --gradle-version 7.1.1

      - name: Build Mod
        run: .\gradlew.bat remapJar --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeVisuals-Mod-Jar
          path: |
            **/build/libs/*.jar
            build/libs/*.jar

