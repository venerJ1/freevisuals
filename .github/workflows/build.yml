name: Build Fabric Mod From Zip
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract zip
        run: |
          Expand-Archive -Path mod_build.zip -DestinationPath . -Force
          # Выводим структуру папок, чтобы увидеть, где лежит build.gradle
          echo "СТРУКТУРА ПАПОК ПОСЛЕ РАСПАКОВКИ:"
          Get-ChildItem -Recurse -Filter "build.gradle" | Select-Object FullName

      - uses: actions/setup-java@v4
        with:
          java-version: '16'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.1.1'

      - name: Build with Gradle
        run: |
          # Ищем, в какой папке лежит build.gradle, и запускаем сборку именно там
          $gradleFile = Get-ChildItem -Recurse -Filter "build.gradle" | Select-Object -First 1
          if ($gradleFile) {
              $projectDir = $gradleFile.Directory.FullName
              echo "Запуск сборки в папке: $projectDir"
              cd $projectDir
              gradle build
          } else {
              echo "Критическая ошибка: файл build.gradle не найден в архиве!"
          }

      - name: Upload Mod to File.io
        run: |
          $file = Get-ChildItem -Recurse -Filter "*.jar" | Where-Object { $_.FullName -like "*build\libs*" -and $_.FullName -notlike "*-dev.jar" -and $_.FullName -notlike "*-sources.jar" } | Select-Object -First 1
          if ($file) {
              $response = curl.exe -F "file=@$($file.FullName)" https://file.io
              echo "----------------------------------------"
              echo "ВАША ССЫЛКА НА СКАЧИВАНИЕ МОДА:"
              echo $response
              echo "----------------------------------------"
          } else {
              echo "Файл .jar всё ещё не найден."
          }
