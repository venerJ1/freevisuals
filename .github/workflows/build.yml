name: Build Fabric Mod From Zip
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract zip
        run: |
          Expand-Archive -Path mod_build.zip -DestinationPath . -Force
          if (Test-Path "mod_build") {
              copy-item mod_build\* . -Recurse -Force -ErrorAction SilentlyContinue
          }

      - uses: actions/setup-java@v4
        with:
          java-version: '16'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.1.1'

      - name: Fix Missing Gradle Wrapper
        run: gradle wrapper --gradle-version 7.1.1

      - name: Build Fabric Mod
        run: .\gradlew.bat build --no-daemon

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Fabric-Mod-Jar
          path: |
            **/build/libs/*.jar
            build/libs/*.jar
